<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PiBot — Dashboard</title>
<style>
  /* ======= Reset & Variables ======= */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:        #0b0e14;
    --surface:   #131720;
    --surface2:  #1a1f2e;
    --border:    #252b3b;
    --text:      #e2e8f0;
    --text-dim:  #8892a6;
    --accent:    #6366f1;
    --accent-bg: rgba(99,102,241,0.12);
    --green:     #22c55e;
    --green-bg:  rgba(34,197,94,0.12);
    --red:       #ef4444;
    --red-bg:    rgba(239,68,68,0.12);
    --yellow:    #eab308;
    --yellow-bg: rgba(234,179,8,0.12);
    --radius:    10px;
    --shadow:    0 2px 12px rgba(0,0,0,0.3);
  }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }
  a { color: var(--accent); text-decoration: none; }

  /* ======= Header ======= */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .version {
    font-size: 12px;
    color: var(--text-dim);
    background: var(--surface2);
    padding: 2px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .status-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  .status-dot.offline { background: var(--red); animation: none; }
  .status-dot.demo { background: var(--yellow); animation: none; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .demo-badge {
    font-size: 11px;
    font-weight: 700;
    color: var(--yellow);
    background: var(--yellow-bg);
    padding: 2px 10px;
    border-radius: 20px;
    border: 1px solid rgba(234,179,8,0.25);
    display: none;
  }
  .demo-badge.visible { display: inline-block; }

  /* ======= Layout ======= */
  .container {
    display: grid;
    grid-template-columns: 1fr 380px;
    grid-template-rows: auto 1fr;
    gap: 20px;
    padding: 20px 28px;
    max-width: 1440px;
    margin: 0 auto;
  }
  @media (max-width: 960px) {
    .container { grid-template-columns: 1fr; }
  }

  /* ======= Stats Cards ======= */
  .stats {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: var(--shadow);
  }
  .stat-card .label {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .stat-card .value {
    font-size: 28px;
    font-weight: 700;
  }
  .stat-card .value.ok    { color: var(--green); }
  .stat-card .value.error { color: var(--red); }
  .stat-card .value.alert { color: var(--yellow); }

  /* ======= Panels ======= */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-header {
    padding: 14px 20px;
    font-size: 14px;
    font-weight: 600;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-body {
    padding: 0;
    flex: 1;
    overflow-y: auto;
    max-height: 480px;
  }

  /* ======= Audit Table ======= */
  .audit-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .audit-table th {
    text-align: left;
    padding: 10px 16px;
    color: var(--text-dim);
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
  }
  .audit-table td {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .audit-table tr:hover td {
    background: var(--surface2);
  }
  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge.ok        { color: var(--green); background: var(--green-bg); }
  .badge.error     { color: var(--red); background: var(--red-bg); }
  .badge.confirmed { color: var(--accent); background: var(--accent-bg); }

  /* ======= Chat ======= */
  .chat-panel {
    grid-row: 2 / 3;
    grid-column: 2 / 3;
    display: flex;
    flex-direction: column;
    max-height: 540px;
  }
  @media (max-width: 960px) {
    .chat-panel { grid-column: 1; }
  }
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .chat-msg {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.5;
  }
  .chat-msg.bot {
    align-self: flex-start;
    background: var(--surface2);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .chat-msg.user {
    align-self: flex-end;
    background: var(--accent);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .chat-input-area {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
  }
  .chat-input-area input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    color: var(--text);
    font-size: 13px;
    outline: none;
  }
  .chat-input-area input:focus { border-color: var(--accent); }
  .chat-input-area button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .chat-input-area button:hover { opacity: 0.85; }

  /* ======= Skills List ======= */
  .skills-list {
    padding: 12px 20px;
  }
  .skill-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .skill-item:last-child { border-bottom: none; }
  .skill-name { font-weight: 500; }
  .skill-agent { color: var(--text-dim); font-size: 12px; }
  .skill-status { font-size: 11px; }
  .skill-status.enabled  { color: var(--green); }
  .skill-status.disabled { color: var(--red); }

  /* ======= Scrollbar ======= */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- ============ Header ============ -->
<header class="header">
  <div class="header-left">
    <span class="logo">PiBot</span>
    <span class="version">v1.2</span>
    <span class="demo-badge" id="demoBadge">DEMO</span>
  </div>
  <div class="header-right">
    <span class="status-badge">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Conectando...</span>
    </span>
  </div>
</header>

<!-- ============ Main Grid ============ -->
<div class="container">

  <!-- Stats row -->
  <section class="stats" id="statsSection">
    <div class="stat-card">
      <div class="label">Acciones totales</div>
      <div class="value" id="statTotal">--</div>
    </div>
    <div class="stat-card">
      <div class="label">Exitosas</div>
      <div class="value ok" id="statOk">--</div>
    </div>
    <div class="stat-card">
      <div class="label">Errores</div>
      <div class="value error" id="statErrors">--</div>
    </div>
    <div class="stat-card">
      <div class="label">Alertas</div>
      <div class="value alert" id="statAlerts">--</div>
    </div>
  </section>

  <!-- Audit log -->
  <div class="panel">
    <div class="panel-header">
      <span>Registro de Actividad</span>
      <span id="auditCount" style="font-size:12px;color:var(--text-dim);"></span>
    </div>
    <div class="panel-body">
      <table class="audit-table">
        <thead>
          <tr>
            <th>Hora</th>
            <th>Skill</th>
            <th>Estado</th>
            <th>Detalle</th>
          </tr>
        </thead>
        <tbody id="auditBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Chat -->
  <div class="panel chat-panel">
    <div class="panel-header">Chat</div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
      <input type="text" id="chatInput" placeholder="Escribe un mensaje..." autocomplete="off">
      <button id="chatSend">Enviar</button>
    </div>
  </div>

  <!-- Skills -->
  <div class="panel" style="grid-column: 1 / -1;">
    <div class="panel-header">
      <span>Skills disponibles</span>
      <span id="skillCount" style="font-size:12px;color:var(--text-dim);"></span>
    </div>
    <div class="panel-body skills-list" id="skillsList"></div>
  </div>

</div>

<!-- ============ Script ============ -->
<script>
(function () {
  "use strict";

  /* -----------------------------------------------------------
   * Estado global
   * --------------------------------------------------------- */
  let IS_DEMO = false;
  let TOKEN   = null;
  let WS      = null;

  /* -----------------------------------------------------------
   * Elementos DOM
   * --------------------------------------------------------- */
  const $id = (id) => document.getElementById(id);

  const dom = {
    demoBadge:   $id("demoBadge"),
    statusDot:   $id("statusDot"),
    statusText:  $id("statusText"),
    statTotal:   $id("statTotal"),
    statOk:      $id("statOk"),
    statErrors:  $id("statErrors"),
    statAlerts:  $id("statAlerts"),
    auditBody:   $id("auditBody"),
    auditCount:  $id("auditCount"),
    chatMessages:$id("chatMessages"),
    chatInput:   $id("chatInput"),
    chatSend:    $id("chatSend"),
    skillsList:  $id("skillsList"),
    skillCount:  $id("skillCount"),
  };

  /* -----------------------------------------------------------
   * Utilidades
   * --------------------------------------------------------- */

  /** Formatea una hora HH:MM:SS */
  function fmtTime(date) {
    if (typeof date === "string") date = new Date(date);
    if (!(date instanceof Date) || isNaN(date)) date = new Date();
    return date.toLocaleTimeString("es-ES", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  }

  /** Crea un badge HTML según el estado */
  function badgeHtml(status) {
    const cls = status === "ok" ? "ok" : status === "confirmed" ? "confirmed" : "error";
    return `<span class="badge ${cls}">${status}</span>`;
  }

  /** Añade una fila al audit log */
  function addAuditRow(time, skill, status, detail) {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${fmtTime(time)}</td>
      <td>${skill}</td>
      <td>${badgeHtml(status)}</td>
      <td>${detail || "—"}</td>
    `;
    dom.auditBody.prepend(tr);
    dom.auditCount.textContent = `${dom.auditBody.children.length} entradas`;
  }

  /** Añade un mensaje al chat */
  function addChatMessage(text, sender) {
    const div = document.createElement("div");
    div.className = `chat-msg ${sender}`;
    div.textContent = text;
    dom.chatMessages.appendChild(div);
    dom.chatMessages.scrollTop = dom.chatMessages.scrollHeight;
  }

  /** Renderiza la lista de skills */
  function renderSkills(skills) {
    dom.skillsList.innerHTML = "";
    skills.forEach((s) => {
      const item = document.createElement("div");
      item.className = "skill-item";
      item.innerHTML = `
        <div>
          <span class="skill-name">${s.name}</span>
          <span class="skill-agent"> &mdash; ${s.description || ""}</span>
        </div>
        <span class="skill-status enabled">activo</span>
      `;
      dom.skillsList.appendChild(item);
    });
    dom.skillCount.textContent = `${skills.length} skills`;
  }

  /* -----------------------------------------------------------
   * DEMO MODE — datos ficticios
   * --------------------------------------------------------- */

  function loadDemoData() {
    IS_DEMO = true;
    dom.demoBadge.classList.add("visible");
    dom.statusDot.className = "status-dot demo";
    dom.statusText.textContent = "Modo demo";

    /* Stats */
    dom.statTotal.textContent  = "47";
    dom.statOk.textContent     = "45";
    dom.statErrors.textContent = "2";
    dom.statAlerts.textContent = "1";

    /* Audit log (5 filas de ejemplo) */
    const now = new Date();
    const rows = [
      { skill: "gmail.read_email",          status: "ok",        detail: "3 emails nuevos" },
      { skill: "notion_tasks.create_task",   status: "confirmed", detail: "Tarea: Revisar propuesta" },
      { skill: "meta.get_insights",          status: "ok",        detail: "Alcance: 12.4k" },
      { skill: "holded.list_invoices",       status: "ok",        detail: "8 facturas pendientes" },
      { skill: "calendar.get_today",         status: "error",     detail: "Token expirado" },
    ];
    rows.forEach((r, i) => {
      const t = new Date(now.getTime() - (rows.length - i) * 60000);
      addAuditRow(t, r.skill, r.status, r.detail);
    });

    /* Chat — mensaje de bienvenida en demo */
    addChatMessage(
      "Modo demo — el backend no está conectado. Así se verá el dashboard en producción.",
      "bot"
    );

    /* Skills */
    renderSkills([
      { name: "gmail.read_email",        agent: "gmail",        enabled: true },
      { name: "gmail.send_email",        agent: "gmail",        enabled: true },
      { name: "notion_tasks.create_task", agent: "notion_tasks", enabled: true },
      { name: "notion_tasks.list_tasks",  agent: "notion_tasks", enabled: true },
      { name: "meta.get_insights",        agent: "meta",         enabled: true },
      { name: "holded.list_invoices",     agent: "holded",       enabled: true },
      { name: "calendar.get_today",       agent: "calendar",     enabled: true },
      { name: "calendar.create_event",    agent: "calendar",     enabled: false },
    ]);
  }

  /* -----------------------------------------------------------
   * API real (solo si hay token)
   * --------------------------------------------------------- */

  const BASE = window.location.origin;

  async function apiFetch(path, options) {
    if (IS_DEMO) return null;
    const res = await fetch(`${BASE}${path}`, {
      ...options,
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${TOKEN}`,
        ...(options?.headers || {}),
      },
    });
    if (!res.ok) throw new Error(`API ${res.status}`);
    return res.json();
  }

  async function loadRealData() {
    try {
      const data = await Promise.all([
        apiFetch("/audit?limit=50"),
        apiFetch("/skills"),
      ]);

      // Stats from audit data
      const audit = data[0];
      const skills = data[1];

      if (audit && audit.entries) {
        const entries = audit.entries;
        const ok = entries.filter(e => e.status === "ok" || e.status === "confirmed").length;
        const errors = entries.filter(e => e.status === "error").length;
        dom.statTotal.textContent  = entries.length;
        dom.statOk.textContent     = ok;
        dom.statErrors.textContent = errors;
        dom.statAlerts.textContent = entries.filter(e => e.status === "blocked").length;

        entries.slice(0, 20).forEach((r) => {
          const time = r.created_at ? new Date(r.created_at).toLocaleTimeString("es-ES", {hour:"2-digit",minute:"2-digit",second:"2-digit"}) : "--";
          addAuditRow(time, r.agent_name + "." + r.action, r.status, r.error_message || r.user_id || "");
        });
      }

      if (skills && skills.skills && Array.isArray(skills.skills)) {
        renderSkills(skills.skills);
      }

      dom.statusDot.className = "status-dot";
      dom.statusText.textContent = "Conectado";
    } catch (err) {
      console.error("Error cargando datos:", err);
      dom.statusDot.className = "status-dot offline";
      dom.statusText.textContent = "Error de conexión";
    }
  }

  function connectWebSocket() {
    if (IS_DEMO) return;
    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    WS = new WebSocket(`${proto}//${location.host}/ws?token=${TOKEN}`);
    WS.onopen = () => {
      dom.statusDot.className = "status-dot";
      dom.statusText.textContent = "Conectado (WS)";
    };
    WS.onmessage = (evt) => {
      try {
        const msg = JSON.parse(evt.data);
        if (msg.type === "audit") {
          addAuditRow(msg.timestamp, msg.skill, msg.status, msg.detail);
        } else if (msg.type === "chat") {
          addChatMessage(msg.text, "bot");
        } else if (msg.type === "stats") {
          dom.statTotal.textContent  = msg.total ?? dom.statTotal.textContent;
          dom.statOk.textContent     = msg.ok ?? dom.statOk.textContent;
          dom.statErrors.textContent = msg.errors ?? dom.statErrors.textContent;
          dom.statAlerts.textContent = msg.alerts ?? dom.statAlerts.textContent;
        }
      } catch (e) { /* ignore non-json */ }
    };
    WS.onclose = () => {
      dom.statusDot.className = "status-dot offline";
      dom.statusText.textContent = "Desconectado";
      setTimeout(connectWebSocket, 5000);
    };
  }

  /* -----------------------------------------------------------
   * Chat interaction
   * --------------------------------------------------------- */

  function sendChat() {
    const text = dom.chatInput.value.trim();
    if (!text) return;
    addChatMessage(text, "user");
    dom.chatInput.value = "";

    if (IS_DEMO) {
      setTimeout(() => {
        addChatMessage(
          "Esto es modo demo — no hay backend. En producción recibirías la respuesta del orquestador aquí.",
          "bot"
        );
      }, 400);
      return;
    }

    /* Enviar vía WebSocket si está abierto, sino por API */
    if (WS && WS.readyState === WebSocket.OPEN) {
      WS.send(JSON.stringify({ type: "chat", text }));
    } else {
      apiFetch("/message", {
        method: "POST",
        body: JSON.stringify({ text, session_id: "dashboard_" + Date.now(), channel: "dashboard" }),
      })
        .then((data) => {
          if (data?.response) addChatMessage(data.response, "bot");
          else if (data?.text) addChatMessage(data.text, "bot");
        })
        .catch(() => addChatMessage("Error al enviar mensaje.", "bot"));
    }
  }

  dom.chatSend.addEventListener("click", sendChat);
  dom.chatInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendChat();
  });

  /* -----------------------------------------------------------
   * Inicialización
   * --------------------------------------------------------- */

  function init() {
    /* Intentar recuperar token del localStorage */
    TOKEN = localStorage.getItem("pibot_token");

    if (!TOKEN) {
      /* Pedir token al usuario */
      TOKEN = prompt("Introduce el token de autenticación para PiBot:");

      if (!TOKEN || !TOKEN.trim()) {
        /* El usuario canceló o dejó vacío — activar modo demo */
        TOKEN = null;
        loadDemoData();
        return;
      }

      TOKEN = TOKEN.trim();
      localStorage.setItem("pibot_token", TOKEN);
    }

    /* Modo real — cargar datos de la API */
    loadRealData();
    connectWebSocket();
  }

  init();

})();
</script>
</body>
</html>
